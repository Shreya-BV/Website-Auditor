<header class="navbar">
  <div class="navbar-container">
    <a routerLink="/" class="logo">
      <span class="logo-icon">🔍</span>
      <span class="logo-text">Website<span class="gradient-text">Auditor</span></span>
    </a>

    <nav class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Home</a>
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">Dashboard</a>
      <a routerLink="/leads" routerLinkActive="active" class="nav-link">Leads</a>
    </nav>

    <div class="actions">
      <button class="theme-btn" (click)="toggleTheme()" [attr.aria-label]="isDarkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'">

    </div>
  </div>
</header>
